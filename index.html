<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAMI CAFETIÈRE</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    
    <style>
        :root { --gold: #c5a059; --black-overlay: rgba(0, 0, 0, 0.6); --white: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background-color: #000; color: var(--white); scroll-behavior: smooth; }
        
        nav { position: fixed; top: 0; width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 30px 8%; z-index: 1000; background: rgba(0,0,0,0.8); }
        .logo { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: var(--gold); }
        .nav-links a { color: var(--white); text-decoration: none; margin: 0 15px; text-transform: uppercase; font-size: 0.9rem; }
        .lang-select { background: transparent; color: var(--gold); border: 1px solid var(--gold); padding: 5px; cursor: pointer; }

        .hero { height: 100vh; display: flex; justify-content: center; align-items: center; background: #222; text-align: center; }
        .hero-content { border: 1px solid var(--gold); padding: 50px; max-width: 700px; backdrop-filter: blur(5px); }
        h1 { color: var(--gold); font-size: 3.5rem; margin-bottom: 20px; }
        .btn-menu { margin-top: 20px; padding: 15px 40px; border: 1px solid var(--gold); background: transparent; color: var(--gold); cursor: pointer; text-transform: uppercase; }
        
        section { padding: 100px 8%; text-align: center; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">CAMI CAFETIÈRE</div>
        <div class="nav-links">
            <a href="#" data-lang-fr="Accueil" data-lang-en="Home">Accueil</a>
            <a href="#menu" data-lang-fr="Menu" data-lang-en="Menu">Menu</a>
            <a href="#reservation" data-lang-fr="Réservation" data-lang-en="Reservation">Réservation</a>
        </div>
        <select class="lang-select" onchange="updateLanguage(this.value)">
            <option value="fr">FR</option>
            <option value="en">EN</option>
        </select>
    </nav>

    <header class="hero">
        <div class="hero-content">
            <h1 id="hero-title">CAMI CAFETIÈRE</h1>
            <p id="hero-desc">L'expérience unique du café, infusée dans le raffinement et l'élégance.</p>
            <button class="btn-menu" id="btn-res" onclick="window.location.href='#reservation'">Réserver une table</button>
        </div>
    </header>

    <section id="menu">
        <h2 id="menu-title">Notre Menu</h2>
    </section>

    <section id="reservation">
        <h2 id="res-title">Réservation</h2>
    </section>

    <script>
        const translations = {
            fr: {
                heroTitle: "CAMI CAFETIÈRE",
                heroDesc: "L'expérience unique du café, infusée dans le raffinement et l'élégance.",
                btnRes: "Réserver une table",
                menuTitle: "Notre Menu",
                resTitle: "Réservation"
            },
            en: {
                heroTitle: "CAMI CAFETIÈRE",
                heroDesc: "The unique coffee experience, infused with refinement and elegance.",
                btnRes: "Book a table",
                menuTitle: "Our Menu",
                resTitle: "Reservation"
            }
        };

        function updateLanguage(lang) {
            document.getElementById('hero-title').innerText = translations[lang].heroTitle;
            document.getElementById('hero-desc').innerText = translations[lang].heroDesc;
            document.getElementById('btn-res').innerText = translations[lang].btnRes;
            document.getElementById('menu-title').innerText = translations[lang].menuTitle;
            document.getElementById('res-title').innerText = translations[lang].resTitle;
            
            // تحديث الروابط في القائمة
            document.querySelectorAll('.nav-links a').forEach(el => {
                el.innerText = el.getAttribute('data-lang-' + lang);
            });
        }
    </script>
</body>
</html>
