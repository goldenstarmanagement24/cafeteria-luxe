<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAMI CAFETIÈRE</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    
    <style>
        :root { --gold: #c5a059; --black-overlay: rgba(0, 0, 0, 0.6); --white: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background-color: #000; color: var(--white); scroll-behavior: smooth; transition: all 0.3s ease; }
        
        nav { position: fixed; top: 0; width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 30px 8%; z-index: 1000; background: rgba(0,0,0,0.8); }
        .logo { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: var(--gold); }
        .nav-links a { color: var(--white); text-decoration: none; margin: 0 15px; text-transform: uppercase; font-size: 0.9rem; }
        .lang-select { background: transparent; color: var(--gold); border: 1px solid var(--gold); padding: 5px; cursor: pointer; }

        .hero { height: 100vh; display: flex; justify-content: center; align-items: center; background: #222; text-align: center; }
        .hero-content { border: 1px solid var(--gold); padding: 50px; max-width: 700px; backdrop-filter: blur(5px); }
        h1 { color: var(--gold); font-size: 3.5rem; margin-bottom: 20px; }
        .btn-menu { margin-top: 20px; padding: 15px 40px; border: 1px solid var(--gold); background: transparent; color: var(--gold); cursor: pointer; text-transform: uppercase; }
        
        section { padding: 100px 8%; text-align: center; }
        
        /* Menu Grid */
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 40px; }
        .menu-item { border: 1px solid var(--gold); padding: 20px; }

        /* Form */
        form { max-width: 500px; margin: 30px auto; display: flex; flex-direction: column; gap: 15px; }
        input, button { padding: 10px; border: 1px solid var(--gold); background: #111; color: var(--white); }
    </style>
</head>
<body>

    <nav>
        <div class="logo">CAMI CAFETIÈRE</div>
        <div class="nav-links">
            <a href="#" data-i18n="navHome">Accueil</a>
            <a href="#menu" data-i18n="navMenu">Menu</a>
            <a href="#reservation" data-i18n="navRes">Réservation</a>
        </div>
        <select class="lang-select" onchange="updateLanguage(this.value)" id="langSwitch">
            <option value="fr">FR</option>
            <option value="en">EN</option>
            <option value="ar">AR</option>
        </select>
    </nav>

    <header class="hero">
        <div class="hero-content">
            <h1 data-i18n="heroTitle">CAMI CAFETIÈRE</h1>
            <p data-i18n="heroDesc">L'expérience unique du café, infusée dans le raffinement et l'élégance.</p>
            <button class="btn-menu" data-i18n="btnRes" onclick="window.location.href='#reservation'">Réserver une table</button>
        </div>
    </header>

    <section id="menu">
        <h2 data-i18n="menuTitle">Notre Menu</h2>
        <div class="menu-grid">
            <div class="menu-item"><h3>Espresso</h3><p>5€</p></div>
            <div class="menu-item"><h3>Cappuccino</h3><p>7€</p></div>
        </div>
    </section>

    <section id="reservation">
        <h2 data-i18n="resTitle">Réservation</h2>
        <form>
            <input type="text" placeholder="Nom" data-i18n="formName" data-i18n-placeholder="true">
            <input type="date">
            <button type="submit" data-i18n="btnSubmit">Envoyer</button>
        </form>
    </section>

    <script>
        const translations = {
            fr: { navHome: "Accueil", navMenu: "Menu", navRes: "Réservation", heroTitle: "CAMI CAFETIÈRE", heroDesc: "L'expérience unique du café.", btnRes: "Réserver", menuTitle: "Notre Menu", resTitle: "Réservation", formName: "Nom", btnSubmit: "Envoyer" },
            en: { navHome: "Home", navMenu: "Menu", navRes: "Reservation", heroTitle: "CAMI CAFETIÈRE", heroDesc: "The unique coffee experience.", btnRes: "Book", menuTitle: "Our Menu", resTitle: "Reservation", formName: "Name", btnSubmit: "Send" },
            ar: { navHome: "الرئيسية", navMenu: "القائمة", navRes: "حجز", heroTitle: "كامي كافيتيريا", heroDesc: "تجربة القهوة الفريدة.", btnRes: "احجز الآن", menuTitle: "قائمتنا", resTitle: "الحجز", formName: "الاسم", btnSubmit: "إرسال" }
        };

        function updateLanguage(lang) {
            document.documentElement.lang = lang;
            document.documentElement.dir = (lang === 'ar') ? 'rtl' : 'ltr';
            localStorage.setItem('lang', lang);
            
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (el.getAttribute('data-i18n-placeholder')) {
                    el.placeholder = translations[lang][key];
                } else {
                    el.innerText = translations[lang][key];
                }
            });
        }

        // Initialize on load
        window.onload = () => {
            const savedLang = localStorage.getItem('lang') || 'fr';
            document.getElementById('langSwitch').value = savedLang;
            updateLanguage(savedLang);
        };
    </script>
</body>
</html>
