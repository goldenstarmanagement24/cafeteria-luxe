<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAMI CAFETIÈRE</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --black: #0a0a0a; --gold: #c5a059; --cream: #e6dfd1; --dark-green: #0a2a1a; --white: #ffffff; }
        body { font-family: 'Playfair Display', serif; background-color: var(--black); color: var(--cream); margin: 0; scroll-behavior: smooth; }
        
        nav { position: fixed; width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 20px 5%; box-sizing: border-box; background: rgba(0,0,0,0.9); z-index: 1000; border-bottom: 1px solid var(--gold); }
        .nav-links a { color: var(--gold); text-decoration: none; font-weight: bold; margin: 0 10px; }
        
        header { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('1000026674.png'); background-size: cover; background-position: center; text-align: center; }
        h1 { font-size: 4rem; color: var(--gold); margin: 0; }
        
        section { padding: 80px 5%; border-bottom: 1px solid #333; }
        h2 { color: var(--gold); text-align: center; font-size: 2.5rem; margin-bottom: 40px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 30px; }
        .card { border: 1px solid var(--gold); padding: 20px; text-align: center; }
        
        .form-container { max-width: 500px; margin: auto; }
        input { width: 100%; padding: 10px; margin: 10px 0; background: #222; border: 1px solid var(--gold); color: white; }
        button { width: 100%; padding: 10px; background: var(--gold); border: none; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">CAMI CAFETIÈRE</div>
        <div class="nav-links">
            <a href="#home" class="lang" data-fr="Accueil" data-ar="الرئيسية">Accueil</a>
            <a href="#menu" class="lang" data-fr="Menu" data-ar="القائمة">Menu</a>
            <a href="#reservation" class="lang" data-fr="Réservation" data-ar="حجز">Réservation</a>
        </div>
        <button onclick="toggleLang()" style="background:none; color:var(--gold); border:1px solid var(--gold); cursor:pointer;">FR / AR</button>
    </nav>

    <header id="home">
        <h1 class="lang" data-fr="CAMI CAFETIÈRE" data-ar="كامي كافيتيريا">CAMI CAFETIÈRE</h1>
        <p>"L'Art du Café & du Raffinement"</p>
    </header>

    <section id="menu">
        <h2 class="lang" data-fr="Nos Créations" data-ar="قائمتنا المميزة">Nos Créations</h2>
        <div class="grid">
            <div class="card"><h3>Espresso</h3><p>5$</p></div>
            <div class="card"><h3>Tiramisu</h3><p>9$</p></div>
            <div class="card"><h3>Cappuccino</h3><p>6$</p></div>
        </div>
    </section>

    <section id="reservation">
        <h2 class="lang" data-fr="Réservation" data-ar="حجز طاولة">Réservation</h2>
        <div class="form-container">
            <input type="text" placeholder="Nom / الاسم">
            <input type="date">
            <button class="lang" data-fr="Confirmer" data-ar="تأكيد الحجز">Confirmer</button>
        </div>
    </section>

    <script>
        let isFr = true;
        function toggleLang() {
            isFr = !isFr;
            const lang = isFr ? 'fr' : 'ar';
            document.documentElement.lang = lang;
            document.documentElement.dir = isFr ? 'ltr' : 'rtl';
            document.querySelectorAll('.lang').forEach(el => {
                el.innerText = el.getAttribute('data-' + lang);
            });
        }
    </script>
</body>
</html>
