<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAMI CAFETIÈRE | Premium Coffee Experience</title>
    <!-- مكتبة للحركات -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        :root { --black: #1a1a1a; --dark-green: #0a2a1a; --gold: #c5a059; --cream: #f4f1ea; }
        
        body { font-family: 'Georgia', serif; background-color: var(--black); color: var(--cream); margin: 0; scroll-behavior: smooth; }
        
        /* Navigation */
        nav { position: fixed; width: 100%; padding: 20px; background: rgba(0,0,0,0.8); display: flex; justify-content: space-around; z-index: 1000; }
        nav a { color: var(--gold); text-decoration: none; font-weight: bold; }

        /* Hero */
        .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        
        /* Grid & Cards */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; padding: 50px; }
        .card { border: 1px solid var(--gold); padding: 20px; cursor: pointer; transition: 0.3s; }
        .card:hover { transform: scale(1.05); background: var(--dark-green); }

        /* Modal (نافذة تكبير المنتج) */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; z-index: 2000; }
        .modal-content { background: var(--cream); color: var(--black); padding: 30px; max-width: 500px; text-align: center; border-radius: 10px; }
        
        .btn { padding: 15px 30px; border: 1px solid var(--gold); color: var(--gold); background: none; cursor: pointer; }
    </style>
</head>
<body>

    <nav>
        <a href="#home">Home</a>
        <a href="#menu">Menu</a>
        <a href="#reservation">Reservation</a>
    </nav>

    <header id="home" class="hero" data-aos="fade-in">
        <h1>CAMI CAFETIÈRE</h1>
        <p>"L'Art du Café & du Raffinement"</p>
    </header>

    <section id="menu">
        <h2 style="text-align: center; color: var(--gold);">Nos Créations Signature</h2>
        <div class="grid">
            <div class="card" onclick="openModal('Espresso', 'Classic Italian Coffee', '5$')">
                <h3>Espresso</h3>
                <p>Click for details</p>
            </div>
            <div class="card" onclick="openModal('Cheesecake', 'Creamy French Style', '8$')">
                <h3>Cheesecake</h3>
                <p>Click for details</p>
            </div>
        </div>
    </section>

    <!-- Modal Element -->
    <div id="productModal" class="modal" onclick="this.style.display='none'">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2 id="modalTitle"></h2>
            <p id="modalDesc"></p>
            <h3 id="modalPrice"></h3>
            <button class="btn" onclick="document.getElementById('productModal').style.display='none'">Close</button>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init();

        function openModal(title, desc, price) {
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalDesc').innerText = desc;
            document.getElementById('modalPrice').innerText = price;
            document.getElementById('productModal').style.display = 'flex';
        }
    </script>
</body>
</html>
