<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="CAMI CAFETIÈRE - L'Art du Café & du Raffinement">
    <title>CAMI CAFETIÈRE | Premium Experience</title>
    <!-- مكتبة الأيقونات والأنيميشن -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        :root { --black: #0a0a0a; --gold: #c5a059; --cream: #e6dfd1; --dark-green: #0a2a1a; }
        body { font-family: 'Playfair Display', serif; background-color: var(--black); color: var(--cream); margin: 0; transition: 0.5s; }
        
        /* Navbar */
        nav { position: fixed; width: 100%; display: flex; justify-content: space-between; padding: 20px 5%; background: rgba(0,0,0,0.95); z-index: 1000; align-items: center; }
        .menu-items { display: flex; }
        .menu-items a { color: var(--gold); margin: 0 15px; text-decoration: none; }
        .hamburger { display: none; cursor: pointer; color: var(--gold); font-size: 24px; }

        /* Hero */
        .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)); }
        
        /* Mobile Responsive */
        @media (max-width: 768px) {
            .menu-items { display: none; flex-direction: column; position: absolute; top: 70px; background: var(--black); width: 100%; text-align: center; }
            .hamburger { display: block; }
        }

        /* Form */
        input, select { padding: 10px; margin: 5px; background: transparent; border: 1px solid var(--gold); color: white; }
        .btn { padding: 15px 30px; border: 1px solid var(--gold); background: transparent; color: var(--gold); cursor: pointer; transition: 0.3s; }
        .btn:hover { background: var(--gold); color: white; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">CAMI CAFETIÈRE</div>
        <div class="hamburger" onclick="toggleMenu()">☰</div>
        <div class="menu-items" id="navLinks">
            <a href="#home">Home</a><a href="#menu">Menu</a><a href="#reservation">Reservation</a>
        </div>
        <select onchange="setLang(this.value)" style="background:none; color:var(--gold);">
            <option value="fr">FR</option><option value="ar">AR</option><option value="en">EN</option>
        </select>
    </nav>

    <header id="home" class="hero">
        <h1 data-ar="كامي كافيتيريا" data-fr="CAMI CAFETIÈRE" data-en="CAMI CAFETIÈRE">CAMI CAFETIÈRE</h1>
    </header>

    <section id="reservation" style="padding: 100px 5%;">
        <h2 data-ar="احجز طاولتك" data-fr="Réservation" data-en="Reservation">Réservation</h2>
        <form id="bookingForm" onsubmit="sendEmail(event)">
            <input type="text" id="name" placeholder="Name" required>
            <input type="date" id="date" required>
            <input type="number" id="guests" placeholder="Guests" required>
            <button type="submit" class="btn">Confirmer</button>
        </form>
    </section>

    <script>
        // تفعيل EmailJS
        (function(){ emailjs.init("YOUR_PUBLIC_KEY"); })();

        function toggleMenu() {
            const nav = document.getElementById('navLinks');
            nav.style.display = (nav.style.display === 'flex') ? 'none' : 'flex';
        }

        function sendEmail(e) {
            e.preventDefault();
            const params = {
                name: document.getElementById('name').value,
                date: document.getElementById('date').value,
                guests: document.getElementById('guests').value
            };
            emailjs.send("YOUR_SERVICE_ID", "YOUR_TEMPLATE_ID", params)
                .then(() => alert("Réservation envoyée!"))
                .catch(err => console.error(err));
        }

        function setLang(lang) {
            document.documentElement.lang = lang;
            document.documentElement.dir = (lang === 'ar') ? 'rtl' : 'ltr';
            document.querySelectorAll('[data-' + lang + ']').forEach(el => el.innerText = el.getAttribute('data-' + lang));
        }
    </script>
</body>
</html>
