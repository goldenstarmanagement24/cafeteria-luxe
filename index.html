<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="CAMI CAFETIÈRE - اكتشف أرقى تجربة قهوة ومشروبات في أجواء فنية مميزة.">
    <title>CAMI CAFETIÈRE | Premium Web Experience</title>
    
    <!-- الخطوط -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        :root { --black: #0a0a0a; --gold: #c5a059; --cream: #e6dfd1; --dark-green: #0a2a1a; }
        body { font-family: 'Cairo', sans-serif; background-color: var(--black); color: var(--cream); margin: 0; scroll-behavior: smooth; }
        h1, h2 { font-family: 'Playfair Display', serif; }
        
        /* Navbar */
        nav { position: fixed; width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; background: rgba(0,0,0,0.95); z-index: 1000; border-bottom: 1px solid var(--gold); box-sizing: border-box; }
        .nav-links { display: flex; align-items: center; }
        .nav-links a { color: var(--gold); text-decoration: none; font-weight: bold; margin: 0 15px; }
        .menu-toggle { display: none; cursor: pointer; color: var(--gold); font-size: 24px; }

        @media (max-width: 768px) {
            .menu-toggle { display: block; }
            .nav-links { display: none; position: absolute; top: 100%; left: 0; width: 100%; background: var(--black); flex-direction: column; padding: 20px 0; border-bottom: 1px solid var(--gold); }
            .nav-links.active { display: flex; }
        }

        /* Sections */
        section { padding: 80px 5%; border-bottom: 1px solid #333; }
        h2 { color: var(--gold); text-align: center; font-size: 2.5rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 30px; }
        .card { border: 1px solid var(--gold); padding: 20px; text-align: center; cursor: pointer; transition: 0.4s; }
        .card:hover { background: var(--gold); color: var(--black); }
        
        /* Forms */
        .form-group { margin-bottom: 15px; text-align: left; max-width: 400px; margin: 0 auto 15px; }
        input, select { width: 100%; padding: 10px; background: #222; border: 1px solid var(--gold); color: var(--white); border-radius: 5px; }
        .btn { display: inline-block; padding: 15px 30px; background: var(--gold); color: var(--black); text-decoration: none; font-weight: bold; cursor: pointer; border: none; transition: 0.3s; }
        .btn:hover { background: var(--cream); }

        /* Footer */
        .footer { background: var(--dark-green); padding: 40px 5%; text-align: center; }
        .social-icons a { color: var(--gold); font-size: 24px; margin: 0 15px; }
        
        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
        .modal-content { background: var(--cream); color: var(--black); padding: 40px; border-radius: 15px; text-align: center; width: 100%; max-width: 500px; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">CAMI CAFETIÈRE</div>
        <div class="menu-toggle" onclick="document.querySelector('.nav-links').classList.toggle('active')"><i class="fas fa-bars"></i></div>
        <div class="nav-links">
            <a href="#home" data-ar="الرئيسية" data-fr="Accueil" data-en="Home">Accueil</a>
            <a href="#menu" data-ar="القائمة" data-fr="Menu" data-en="Menu">Menu</a>
            <a href="#reservation" data-ar="حجز" data-fr="Réservation" data-en="Reservation">Réservation</a>
            <a href="#contact" data-ar="اتصل بنا" data-fr="Contact" data-en="Contact">Contact</a>
            <select onchange="setLang(this.value)" style="background:none; color:var(--gold); border:1px solid var(--gold); margin-left:10px;">
                <option value="fr">FR</option><option value="ar">AR</option><option value="en">EN</option>
            </select>
        </div>
    </nav>

    <header id="home" style="height:100vh; display:flex; flex-direction:column; justify-content:center; align-items:center; background:linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('coffee-hero.jpg'); background-size:cover; background-position:center; text-align:center;">
        <h1 data-ar="كامي كافيتيريا" data-fr="CAMI CAFETIÈRE" data-en="CAMI CAFETIÈRE" style="font-size: 4rem; color:var(--gold); margin: 0;">CAMI CAFETIÈRE</h1>
        <p>"L'Art du Café & du Raffinement"</p>
        <a href="#reservation" class="btn" data-ar="احجز طاولتك" data-fr="Réserver" data-en="Book Now">Réserver</a>
    </header>

    <section id="menu">
        <h2 data-ar="منتجاتنا المميزة" data-fr="Nos Créations" data-en="Our Creations">Nos Créations</h2>
        <div class="grid">
            <div class="card" onclick="openModal('Espresso', '5$', 'Rich & Bold')"><h3>Espresso</h3></div>
            <div class="card" onclick="openModal('Tiramisu', '9$', 'Authentic Italian')"><h3>Tiramisu</h3></div>
            <div class="card" onclick="openModal('Cappuccino', '6$', 'Creamy Perfection')"><h3>Cappuccino</h3></div>
            <div class="card" onclick="openModal('Cheesecake', '8$', 'French Style')"><h3>Cheesecake</h3></div>
        </div>
    </section>

    <section id="reservation">
        <h2 data-ar="حجز طاولة" data-fr="Réservation" data-en="Reservation">Réservation</h2>
        <form onsubmit="alert('Merci pour votre demande!'); return false;">
            <div class="form-group"><input type="text" placeholder="Nom / الاسم" required></div>
            <div class="form-group"><input type="date" required></div>
            <div class="form-group"><input type="number" placeholder="Nombre de personnes / عدد الأشخاص" required></div>
            <div style="text-align:center;"><button type="submit" class="btn" data-ar="إرسال الطلب" data-fr="Envoyer" data-en="Send">Envoyer</button></div>
        </form>
    </section>

    <section id="contact" class="footer">
        <h2 data-ar="تواصل معنا" data-fr="Contactez-nous" data-en="Contact Us">Contact</h2>
        <div class="social-icons">
            <a href="#"><i class="fab fa-facebook"></i></a>
            <a href="#"><i class="fab fa-instagram"></i></a>
        </div>
    </section>

    <div id="modal" class="modal" onclick="this.style.display='none'">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2 id="m-title"></h2>
            <p id="m-price" style="font-size: 1.5rem; color: var(--gold);"></p>
            <p id="m-desc"></p>
            <button onclick="document.getElementById('modal').style.display='none'" class="btn">Close</button>
        </div>
    </div>

    <script>
        function setLang(lang) {
            document.documentElement.lang = lang;
            document.documentElement.dir = (lang === 'ar') ? 'rtl' : 'ltr';
            document.querySelectorAll('[data-' + lang + ']').forEach(el => {
                el.innerText = el.getAttribute('data-' + lang);
            });
        }
        function openModal(t, p, d) {
            document.getElementById('m-title').innerText = t;
            document.getElementById('m-price').innerText = p;
            document.getElementById('m-desc').innerText = d;
            document.getElementById('modal').style.display = 'flex';
        }
    </script>
</body>
</html>
