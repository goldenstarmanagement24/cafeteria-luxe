<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAMI CAFETIÈRE | Accueil</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold: #c5a059;
            --dark-green: #0a2a1a;
            --black-overlay: rgba(0, 0, 0, 0.6);
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #000;
            color: var(--white);
            overflow-x: hidden;
        }

        /* تنسيق القائمة العلوية */
        nav {
            position: absolute;
            top: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 8%;
            z-index: 100;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: 3px;
            color: var(--gold);
        }

        .nav-links a {
            color: var(--white);
            text-decoration: none;
            margin: 0 20px;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: color 0.3s;
        }

        .nav-links a:hover { color: var(--gold); }

        .lang-select { color: var(--gold); cursor: pointer; border: 1px solid var(--gold); padding: 5px; background: transparent; }

        /* قسم الهيرو (الخلفية الرئيسية) */
        .hero {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: url('1000026674.png') no-repeat center center/cover;
            position: relative;
        }

        /* المربع الزجاجي في المنتصف */
        .hero-content {
            background: var(--black-overlay);
            padding: 50px;
            text-align: center;
            border: 1px solid var(--gold);
            max-width: 700px;
            backdrop-filter: blur(5px);
            animation: fadeIn 1.5s ease-in;
        }

        .hero-content h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            color: var(--gold);
            margin-bottom: 20px;
        }

        .hero-content p {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 30px;
            color: #eee;
        }

        .btn-menu {
            padding: 15px 40px;
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            font-size: 1rem;
            cursor: pointer;
            transition: 0.4s;
            text-transform: uppercase;
        }

        .btn-menu:hover {
            background: var(--gold);
            color: #000;
        }

        /* تأثير الظهور */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* تجاوب الشاشة */
        @media (max-width: 768px) {
            .nav-links { display: none; }
            .hero-content h1 { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">CAMI CAFETIÈRE</div>
        <div class="nav-links">
            <a href="#">Accueil</a>
            <a href="#">Menu</a>
            <a href="#">Réservation</a>
            <a href="#">Contact</a>
        </div>
        <div class="lang-select">EN | FR ▾</div>
    </nav>

    <header class="hero">
        <div class="hero-content">
            <h1>CAMI CAFETIÈRE</h1>
            <p>L'expérience unique du café, infusée dans le raffinement et l'élégance. Découvrez nos créations artisanales dans un cadre d'exception.</p>
            <button class="btn-menu">Casiner un menu</button>
        </div>
    </header>

</body>
</html>
