<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAMI CAFETIÈRE</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    
    <style>
        :root { --gold: #c5a059; --black-overlay: rgba(0, 0, 0, 0.6); --white: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background-color: #000; color: var(--white); scroll-behavior: smooth; }
        
        nav { position: fixed; top: 0; width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 30px 8%; z-index: 1000; background: rgba(0,0,0,0.8); }
        .logo { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: var(--gold); }
        .nav-links a { color: var(--white); text-decoration: none; margin: 0 15px; text-transform: uppercase; font-size: 0.9rem; }
        .lang-select { background: transparent; color: var(--gold); border: 1px solid var(--gold); padding: 5px; cursor: pointer; }

        .hero { height: 100vh; display: flex; justify-content: center; align-items: center; background: #222; text-align: center; }
        .hero-content { border: 1px solid var(--gold); padding: 50px; max-width: 700px; backdrop-filter: blur(5px); }
        h1 { color: var(--gold); font-size: 3.5rem; margin-bottom: 20px; }
        
        /* تنسيق قسم الحجز */
        section { padding: 100px 8%; text-align: center; }
        form { display: flex; flex-direction: column; max-width: 400px; margin: 30px auto; gap: 15px; }
        input, select, button { padding: 12px; background: #111; border: 1px solid var(--gold); color: #fff; }
        .btn-submit { color: var(--gold); cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        .btn-submit:hover { background: var(--gold); color: #000; }
    </style>
</head>
