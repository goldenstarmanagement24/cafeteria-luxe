<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAMI CAFETIÈRE | Premium Experience</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --black: #0a0a0a; --gold: #c5a059; --cream: #e6dfd1; --dark-green: #0a2a1a; }
        body { font-family: 'Cairo', sans-serif; background-color: var(--black); color: var(--cream); margin: 0; scroll-behavior: smooth; }
        h1, h2 { font-family: 'Playfair Display', serif; }
        nav { position: fixed; width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; background: rgba(0,0,0,0.9); z-index: 1000; border-bottom: 1px solid var(--gold); }
        .nav-links { display: flex; align-items: center; }
        .nav-links a { color: var(--gold); text-decoration: none; font-weight: bold; margin: 0 15px; }
        .menu-toggle { display: none; cursor: pointer; color: var(--gold); }
        header { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://i.ibb.co/L0N7gYm/1000026671.png'); background-size: cover; background-position: center; text-align: center; }
        .btn { padding: 15px 30px; background: var(--gold); color: var(--black); font-weight: bold; cursor: pointer; text-decoration: none; }
        section { padding: 80px 5%; border-bottom: 1px solid #333; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 30px; }
        .card { border: 1px solid var(--gold); padding: 20px; text-align: center; cursor: pointer; transition: 0.3s; }
        .card:hover { background: var(--gold); color: var(--black); }
        @media (max-width: 768px) { .menu-toggle { display: block; } .nav-links { display: none; position: absolute; top: 100%; left: 0; width: 100%; background: var(--black); flex-direction: column; padding: 20px; } .nav-links.active { display: flex; } }
    </style>
</head>
<body>
    <nav>
        <div class="logo">CAMI CAFETIÈRE</div>
        <div class="menu-toggle" onclick="document.querySelector('.nav-links').classList.toggle('active')"><i class="fas fa-bars"></i></div>
        <div class="nav-links">
            <a href="#home">Home</a><a href="#menu">Menu</a><a href="#reservation">Reservation</a><a href="#contact">Contact</a>
        </div>
    </nav>
    <header id="home"><h1>CAMI CAFETIÈRE</h1><p>"L'Art du Café"</p><a href="#reservation" class="btn">Réserver</a></header>
    <section id="menu">
        <h2>Nos Créations</h2>
        <div class="grid">
            <div class="card" onclick="alert('Espresso - 5$')"><h3>Espresso</h3></div>
            <div class="card" onclick="alert('Tiramisu - 9$')"><h3>Tiramisu</h3></div>
        </div>
    </section>

    <section id="reservation">
        <h2>Réservation</h2>
        <form onsubmit="sendWhatsApp(event)" style="max-width:400px; margin:auto;">
            <input type="text" id="name" placeholder="Nom" required style="width:100%; padding:10px; margin-bottom:10px;">
            <input type="date" id="date" required style="width:100%; padding:10px; margin-bottom:10px;">
            <button type="submit" class="btn">Send via WhatsApp</button>
        </form>
    </section>

    <footer id="contact" style="padding:40px; text-align:center; background:var(--dark-green);">
        <p>Contact Us</p>
    </footer>

    <script>
        function sendWhatsApp(e) {
            e.preventDefault();
            let name = document.getElementById('name').value;
            let date = document.getElementById('date').value;
            window.open(`https://wa.me/213600000000?text=Reservation: ${name} le ${date}`, '_blank');
        }
    </script>
</body>
</html>
